- Name: South Faron Woods Behind Gate
  Map Sector: Faron Province
  Region: Faron Woods
  Twilight: Faron
  Can Warp: True
  Can Change Time: True
  Locations:
    South Faron Woods Twilit Insect Behind Gate 1: Can_Defeat_Faron_Twilit_Insect
    South Faron Woods Twilit Insect Behind Gate 2: Can_Defeat_Faron_Twilit_Insect
  Exits:
    Faron Woods Cave South: Nothing
    South Faron Woods: Can_Dig or Can_Clear_Forest or 'Can_Access_South_Faron_Woods'

